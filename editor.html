<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推箱子 - 关卡编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .main-container {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .editor-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            flex: 1;
            min-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .preview-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            flex: 1;
            min-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        h2 {
            color: #555;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 50px);
            grid-template-rows: repeat(6, 50px);
            gap: 1px;
            background: #ccc;
            padding: 1px;
            margin-bottom: 20px;
            border: 2px solid #333;
        }

        .grid-cell {
            width: 50px;
            height: 50px;
            background: #f5f5f5;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            user-select: none;
            border: 1px solid #ddd;
        }

        .grid-cell:hover {
            opacity: 0.8;
        }

        .cell-floor {
            background: #e8f5e9;
        }

        .cell-wall {
            background: #cc8844;
            color: white;
        }

        .cell-portal {
            background: #ffaa00;
            color: white;
        }

        .cell-goal {
            background: #ff1744;
            color: white;
        }

        .cell-player {
            background: #2ecc71;
            color: white;
        }

        .cell-box {
            background: #e74c3c;
            color: white;
        }

        .divider {
            grid-column: 1 / -1;
            background: #333 !important;
            height: 3px;
            margin: 5px 0;
        }

        .tool-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tool-btn {
            padding: 8px 12px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 12px;
        }

        .tool-btn:hover {
            background: #667eea;
            color: white;
        }

        .tool-btn.active {
            background: #667eea;
            color: white;
        }

        .info-section {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .info-item {
            margin-bottom: 10px;
            font-size: 14px;
        }

        .info-label {
            font-weight: bold;
            color: #333;
        }

        .info-value {
            color: #666;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            resize: vertical;
            margin-bottom: 10px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-success {
            background: #51cf66;
            color: white;
        }

        .btn-success:hover {
            background: #40c057;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        .legend {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .legend-color {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            border: 1px solid #999;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
            background: #ccc;
            padding: 2px;
            margin-bottom: 15px;
            border: 2px solid #333;
        }

        .preview-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
        }

        .divider-line {
            grid-column: 1 / -1;
            background: #333;
            height: 3px;
        }

        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
            }

            .editor-panel, .preview-panel {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- 编辑器 -->
        <div class="editor-panel">
            <h1>🎮 推箱子关卡编辑器</h1>
            
            <h2>选择工具</h2>
            <div class="tool-buttons">
                <button class="tool-btn active" data-tool="floor">🟩 地板</button>
                <button class="tool-btn" data-tool="wall">🟫 墙</button>
                <button class="tool-btn" data-tool="portal">🟠 传送门</button>
                <button class="tool-btn" data-tool="goal">❤️ 目标</button>
                <button class="tool-btn" data-tool="player">🟢 玩家</button>
                <button class="tool-btn" data-tool="box">🔴 箱子</button>
            </div>

            <h2>上半场编辑</h2>
            <div id="gridTop" class="grid"></div>

            <h2>下半场编辑</h2>
            <div id="gridBottom" class="grid"></div>

            <div class="button-group">
                <button class="btn btn-danger" onclick="editor.clearAll()">清空所有</button>
                <button class="btn btn-primary" onclick="editor.exportData()">导出数据</button>
            </div>

            <h2>导入/导出</h2>
            <textarea id="dataExport" placeholder="在这里粘贴关卡数据..."></textarea>
            <div class="button-group">
                <button class="btn btn-primary" onclick="editor.importData()">导入数据</button>
                <button class="btn btn-success" onclick="editor.copyToClipboard()">复制到剪贴板</button>
            </div>
        </div>

        <!-- 预览面板 -->
        <div class="preview-panel">
            <h1>📋 预览与说明</h1>

            <h2>图例</h2>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #e8f5e9;"></div>
                    <span>地板</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #cc8844;"></div>
                    <span>墙</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ffaa00;"></div>
                    <span>传送门</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff1744;"></div>
                    <span>目标</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #2ecc71;"></div>
                    <span>玩家</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #e74c3c;"></div>
                    <span>箱子</span>
                </div>
            </div>

            <h2>实时预览</h2>
            <div id="preview" class="preview-grid"></div>

            <div class="info-section">
                <h2>检查清单</h2>
                <div class="info-item">
                    <span class="info-label">✓ 玩家数量:</span>
                    <span class="info-value" id="checkPlayer">1</span>
                </div>
                <div class="info-item">
                    <span class="info-label">✓ 箱子数量:</span>
                    <span class="info-value" id="checkBox">1</span>
                </div>
                <div class="info-item">
                    <span class="info-label">✓ 目标数量:</span>
                    <span class="info-value" id="checkGoal">1</span>
                </div>
                <div class="info-item">
                    <span class="info-label">✓ 传送门对数:</span>
                    <span class="info-value" id="checkPortal">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">✓ 玩家所在半场:</span>
                    <span class="info-value" id="checkHalf">上半场</span>
                </div>
                <div class="info-item">
                    <span class="info-label">✓ 目标所在半场:</span>
                    <span class="info-value" id="checkGoalHalf">下半场</span>
                </div>
            </div>

            <div class="info-section">
                <h2>使用说明</h2>
                <p style="font-size: 13px; line-height: 1.6; color: #666;">
                    1. 在左侧选择工具<br>
                    2. 点击网格单元格编辑地图<br>
                    3. 上下两部分代表游戏的两个半场<br>
                    4. 玩家出生在上半场，目标在下半场<br>
                    5. 使用传送门连接两个半场<br>
                    6. 编辑完成后点击"导出数据"获取代码
                </p>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" onclick="editor.testLevel()">🎮 测试关卡</button>
            </div>
        </div>
    </div>

    <script src="editor.js"></script>
</body>
</html>
